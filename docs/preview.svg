<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Winamp Classic Home Assistant theme preview</title>
  <desc id="desc">Stylized preview card showing a Home Assistant dashboard rendered in a Winamp Classic 2.x inspired shell.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#666e7a"/>
      <stop offset="30%" stop-color="#444b56"/>
      <stop offset="100%" stop-color="#1c2028"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#aab0bb"/>
      <stop offset="10%" stop-color="#8d94a0"/>
      <stop offset="45%" stop-color="#676f7b"/>
      <stop offset="100%" stop-color="#39404a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#757c88"/>
      <stop offset="100%" stop-color="#5a616d"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="none" opacity="0.16"/>
  <rect x="88" y="66" width="1104" height="588" rx="6" fill="#262a32" stroke="#11151b" stroke-width="4"/>
  <rect x="104" y="82" width="1072" height="64" fill="url(#chrome)" stroke="#0f131b" stroke-width="2"/>
  <text x="136" y="123" fill="#12161c" font-family="Tahoma, Verdana, sans-serif" font-size="32" font-weight="700">WINAMP CLASSIC</text>
