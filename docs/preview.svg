  <rect x="928" y="448" width="182" height="28" fill="#11151d" stroke="#89929d" stroke-width="2"/>
  <text x="944" y="468" fill="#00ff66" font-family="'Lucida Console', monospace" font-size="18">01. The Living Room</text>
  <rect x="928" y="486" width="182" height="28" fill="#4f6fa8"/>
  <text x="944" y="506" fill="#f4f7fb" font-family="'Lucida Console', monospace" font-size="18">02. Lights Out Mix</text>
  <rect x="928" y="524" width="182" height="28" fill="#11151d" stroke="#89929d" stroke-width="2"/>
  <text x="944" y="544" fill="#00ff66" font-family="'Lucida Console', monospace" font-size="18">03. Security Loop</text>
  <text x="430" y="540" fill="#c4c0a6" font-family="Tahoma, Verdana, sans-serif" font-size="18">Closer to the default classic skin: blue selection, green text, harder bevels.</text>
  <text x="430" y="568" fill="#c4c0a6" font-family="Tahoma, Verdana, sans-serif" font-size="18">Built as a HACS-ready single-theme repository.</text>
