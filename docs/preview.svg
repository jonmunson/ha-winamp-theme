  <rect x="370" y="146" width="806" height="492" fill="#2a2f39" stroke="#0f131b" stroke-width="2"/>
  <rect x="128" y="174" width="200" height="36" fill="#4f6fa8"/>
  <text x="150" y="199" fill="#f4f7fb" font-family="Tahoma, Verdana, sans-serif" font-size="20" font-weight="700">Dashboard</text>
  <text x="132" y="256" fill="#171c25" font-family="Tahoma, Verdana, sans-serif" font-size="24">Overview</text>
  <text x="132" y="304" fill="#171c25" font-family="Tahoma, Verdana, sans-serif" font-size="24">Playlist</text>
