  chip-background-color: "#090c14"
  ha-chip-background-color: "#090c14"
  ha-chip-box-shadow: "inset 1px 1px 0 #6f7691, inset -1px -1px 0 #1e2436, 0 0 0 1px #141724"
  badge-color: "#00ff62"
  badge-background-color: "#090c14"

  card-mod-root-yaml: |
    paper-tabs$: |
      #selectionBar {
        height: 3px !important;
        background: linear-gradient(180deg, var(--winamp-gold-bright) 0%, var(--winamp-gold) 100%) !important;
        box-shadow: 0 0 0 1px #5a5227;
      }
    .: |
      ha-app-layout {
        background: var(--lovelace-background);
      }
      app-header {
        background: linear-gradient(180deg, var(--winamp-shell-dark) 0%, #10131f 100%) !important;
        border-bottom: 1px solid #111420;
        box-shadow: inset 0 1px 0 var(--winamp-shell-light), inset 0 -1px 0 #0b0d15;
      }
      app-toolbar {
        min-height: 46px;
        background:
          linear-gradient(90deg, transparent 0 10px, var(--winamp-gold) 10px 126px, transparent 126px calc(100% - 126px), var(--winamp-gold) calc(100% - 126px) calc(100% - 10px), transparent calc(100% - 10px)),
          linear-gradient(180deg, #1d2132 0%, #141827 100%) !important;
        box-shadow: inset 0 1px 0 #69718d, inset 0 -1px 0 #0b0d15;
      }
      [main-title] {
        color: var(--winamp-gold-bright) !important;
        font-size: 13px !important;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      ha-menu-button,
      ha-button-menu,
      ha-assist-chip-icon {
        color: var(--winamp-gold) !important;
      }
      ha-tabs {
        --paper-tabs-selection-bar-color: var(--winamp-gold) !important;
      }
      paper-tab[aria-selected="true"] {
        color: var(--winamp-gold-bright) !important;
      }
      paper-tab {
        color: #9a956f !important;
      }

  card-mod-sidebar: |
    :host {
      background: linear-gradient(180deg, #353c55 0%, #2c334c 100%) !important;
      border-right: 1px solid #131722;
      box-shadow: inset -1px 0 0 #626a86;
    }
    ha-md-list-item,
    .iron-selected,
    .menu-link {
      border-radius: 0 !important;
    }
    .iron-selected,
    ha-md-list-item[selected] {
      background: linear-gradient(180deg, #0d1019 0%, #05070c 100%) !important;
      color: var(--winamp-lcd-green) !important;
      box-shadow: inset 1px 1px 0 #69718d, inset -1px -1px 0 #020305, 0 0 0 1px #141724;
    }
    ha-icon,
    ha-svg-icon {
      color: var(--winamp-gold) !important;
    }

  card-mod-view: |
    :host {
      padding: 10px 12px 18px;
    }
    #columns {
      gap: 12px !important;
    }

  card-mod-card: |
    ha-card {
      position: relative;
      overflow: hidden;
      padding-top: 18px;
      background:
        linear-gradient(180deg, rgba(154, 162, 189, 0.22) 0%, rgba(90, 99, 128, 0.16) 10%, rgba(52, 59, 84, 0.12) 50%, rgba(9, 11, 18, 0.18) 100%),
        linear-gradient(180deg, var(--winamp-shell-mid) 0%, #303650 100%) !important;
      border: 1px solid #141724 !important;
      border-radius: 0 !important;
      box-shadow: inset 1px 1px 0 var(--winamp-bevel-light), inset -1px -1px 0 var(--winamp-bevel-dark), 0 0 0 1px #0b0d15 !important;
    }
    ha-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 16px;
      background:
        linear-gradient(90deg, transparent 0 8px, var(--winamp-gold) 8px 92px, transparent 92px calc(100% - 92px), var(--winamp-gold) calc(100% - 92px) calc(100% - 8px), transparent calc(100% - 8px)),
        linear-gradient(180deg, var(--winamp-shell-dark) 0%, #111522 100%);
      border-bottom: 1px solid #49506a;
      box-shadow: inset 0 1px 0 #69718d;
      pointer-events: none;
      z-index: 0;
    }
    ha-card > .card-header {
      position: relative;
      z-index: 1;
      margin: -2px 0 10px;
      padding: 0 12px 6px;
      color: var(--winamp-gold-bright);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.2;
      text-transform: uppercase;
      text-shadow: 0 1px 0 #090b12;
    }
    ha-card > .card-content,
    ha-card > #states,
    ha-card > .content {
      margin: 0 8px 8px;
      padding: 10px;
      background: linear-gradient(180deg, #0c0f18 0%, #05070c 100%);
      box-shadow: inset 1px 1px 0 #626b89, inset -1px -1px 0 #020305, 0 0 0 1px #121622;
      color: var(--winamp-lcd-green);
    }
    ha-card h1,
    ha-card h2,
    ha-card h3,
    ha-card .name,
    ha-card .header {
      color: var(--winamp-gold-bright);
    }
    ha-card mwc-button,
    ha-card button,
    ha-card .button {
      --mdc-theme-primary: #293049;
      --mdc-theme-on-primary: var(--winamp-gold-bright);
    }
    ha-card ha-slider,
    ha-card ha-control-slider {
      --slider-color: var(--winamp-gold);
      --slider-secondary-color: #4c5670;
    }

  card-mod-glance: |
    :host {
      background: linear-gradient(180deg, #0c0f18 0%, #05070c 100%);
      box-shadow: inset 1px 1px 0 #626b89, inset -1px -1px 0 #020305, 0 0 0 1px #121622;
      color: var(--winamp-lcd-green);
      padding: 6px 4px;
    }

  card-mod-badge: |
    :host {
      background: linear-gradient(180deg, #0d1019 0%, #05070c 100%);
      color: var(--winamp-lcd-green) !important;
      border: 1px solid #141724;
      border-radius: 0;
      box-shadow: inset 1px 1px 0 #69718d, inset -1px -1px 0 #020305;
      padding: 2px 6px;
    }

  card-mod-heading-badge: |
    :host {
      background: linear-gradient(180deg, #0d1019 0%, #05070c 100%);
      color: var(--winamp-lcd-green) !important;
      border: 1px solid #141724;
      border-radius: 0;
      box-shadow: inset 1px 1px 0 #69718d, inset -1px -1px 0 #020305;
    }

  card-mod-assist-chip: |
    :host {
      background: linear-gradient(180deg, #0d1019 0%, #05070c 100%);
      color: var(--winamp-gold-bright) !important;
      border: 1px solid #141724;
      border-radius: 0;
      box-shadow: inset 1px 1px 0 #69718d, inset -1px -1px 0 #020305;
    }

  card-mod-theme: "Winamp Classic"
