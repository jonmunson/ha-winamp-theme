  ha-chip-background-color: "#0b0e16"
  ha-chip-box-shadow: "inset 1px 1px 0 #717a95, inset -1px -1px 0 #020305, 0 0 0 1px #20263a"
  badge-color: "#d6d2b8"
  badge-background-color: "#0b0e16"

  card-mod-root-yaml: |
    paper-tabs$: |
      #selectionBar {
        height: 1px !important;
        background: linear-gradient(180deg, var(--winamp-gold-bright) 0%, var(--winamp-gold) 100%) !important;
        box-shadow: 0 0 0 1px rgba(90,82,39,0.35);
      }
    .: |
      ha-app-layout {
        background: var(--lovelace-background);
      }
      app-header {
        background: linear-gradient(180deg, #22283a 0%, #181c2b 45%, #10131f 100%) !important;
        border-bottom: 1px solid #111420;
        box-shadow: inset 0 1px 0 #7d869c, inset 0 2px 0 rgba(255,255,255,0.08), inset 0 -1px 0 #0b0d15;
      }
      app-toolbar {
        min-height: 34px;
        background:
          linear-gradient(90deg, transparent 0 10px, #efe8a9 10px 18px, var(--winamp-gold) 18px 126px, transparent 126px calc(100% - 126px), var(--winamp-gold) calc(100% - 126px) calc(100% - 18px), #efe8a9 calc(100% - 18px) calc(100% - 10px), transparent calc(100% - 10px)),
          repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, rgba(0,0,0,0.02) 1px, rgba(0,0,0,0.02) 2px),
          linear-gradient(180deg, #252b3f 0%, #1a1e2d 42%, #141827 100%) !important;
        box-shadow: inset 0 1px 0 #7b849b, inset 0 2px 0 rgba(255,255,255,0.08), inset 0 -1px 0 #0b0d15;
      }
      [main-title] {
        color: var(--winamp-gold-bright) !important;
        font-size: 12px !important;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: none;
      }
      ha-menu-button,
      ha-button-menu,
      ha-assist-chip-icon {
        color: var(--winamp-gold) !important;
      }
      ha-tabs {
        --paper-tabs-selection-bar-color: var(--winamp-gold) !important;
        --mdc-tab-height: 32px;
      }
      hui-energy-period-selector,
      hui-energy-date-selection,
      ha-date-range-picker,
      ha-selector,
      .range-selection,
      .period-selector {
        --mdc-filled-button-container-color: #d7dce6;
        --mdc-filled-button-label-text-color: #283048;
      }
      paper-tab[aria-selected="true"] {
        color: var(--winamp-gold-bright) !important;
      }
      paper-tab {
        color: #9a956f !important;
        font-size: 12px !important;
        letter-spacing: 0.02em;
      }
      h1,
      h2,
      .title,
      .header {
        letter-spacing: 0.01em;
      }

  card-mod-sidebar: |
    :host {
      background: linear-gradient(180deg, #59617a 0%, #4a5167 16%, #42495f 58%, #3d4459 100%) !important;
      border-right: 1px solid #131722;
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.05), inset -1px 0 0 #69718d;
    }
    ha-md-list-item,
    .iron-selected,
    .menu-link {
      border-radius: 0 !important;
    }
    .iron-selected,
    ha-md-list-item[selected] {
      background: linear-gradient(180deg, #53656d 0%, #44565d 18%, #3a4a50 100%) !important;
      color: var(--winamp-lcd-green) !important;
      box-shadow: inset 1px 1px 0 #8592a6, inset -1px -1px 0 #223239, 0 0 0 1px #141724;
    }
    ha-icon,
    ha-svg-icon {
      color: var(--winamp-gold) !important;
    }

  card-mod-view: |
    :host {
      padding: 6px 8px 12px;
    }
    #columns {
      gap: 8px !important;
    }

  card-mod-card: |
    ha-card {
      position: relative;
      overflow: hidden;
      padding-top: 14px;
      background:
        linear-gradient(180deg, rgba(188, 194, 212, 0.22) 0%, rgba(142, 149, 173, 0.16) 8%, rgba(103, 110, 134, 0.1) 18%, rgba(71, 77, 97, 0.07) 52%, rgba(9, 11, 18, 0.16) 100%),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, rgba(0,0,0,0.02) 1px, rgba(0,0,0,0.02) 2px),
        linear-gradient(180deg, #5a627a 0%, #4a5167 14%, #434a5f 54%, #3f4659 100%) !important;
      border: 1px solid #141724 !important;
      border-radius: 0 !important;
      box-shadow: inset 1px 1px 0 #9097af, inset 2px 2px 0 rgba(255,255,255,0.07), inset -1px -1px 0 var(--winamp-bevel-dark), 0 0 0 1px #0b0d15 !important;
    }
    ha-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 10px;
      background:
        linear-gradient(90deg, transparent 0 8px, #f1eaac 8px 14px, var(--winamp-gold) 14px 76px, transparent 76px calc(100% - 76px), var(--winamp-gold) calc(100% - 76px) calc(100% - 14px), #f1eaac calc(100% - 14px) calc(100% - 8px), transparent calc(100% - 8px)),
        linear-gradient(180deg, #252b3e 0%, #181c2a 45%, #111522 100%);
      border-bottom: 1px solid #49506a;
      box-shadow: inset 0 1px 0 #7f88a0;
      pointer-events: none;
      z-index: 0;
    }
    ha-card > .card-header {
      position: relative;
      z-index: 1;
      margin: -1px 0 6px;
      padding: 0 9px 4px;
      color: var(--winamp-gold-bright);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.2;
      text-transform: uppercase;
      text-shadow: 0 1px 0 #090b12;
    }
    ha-card > .card-content,
    ha-card > #states,
    ha-card > .content {
      margin: 0;
      padding: 8px;
      background: transparent;
      box-shadow: none;
      color: var(--primary-text-color);
    }
    ha-card h1,
    ha-card h2,
    ha-card h3,
    ha-card .name,
    ha-card .header {
      color: var(--winamp-gold-bright);
    }
    ha-card .secondary,
    ha-card .state__uom,
    ha-card .state,
    ha-card .value {
      color: var(--primary-text-color);
    }
    ha-card ha-chart-base,
    ha-card state-history-charts,
    ha-card .chart-container,
    ha-card .graph,
    ha-card .apexcharts-canvas,
    ha-card .recharts-wrapper {
      display: block;
      margin-top: 4px;
      padding: 8px;
      background: linear-gradient(180deg, #141927 0%, #0b0f17 30%, #05070c 100%) !important;
      box-shadow: inset 1px 1px 0 #757f9c, inset -1px -1px 0 #020305, 0 0 0 1px #121622 !important;
      color: var(--winamp-lcd-green);
    }
    ha-card svg text,
    ha-card .legend,
    ha-card .legend__item,
    ha-card .axis,
    ha-card .xAxis,
    ha-card .yAxis {
      fill: #bcb7a2 !important;
      color: #bcb7a2 !important;
    }
    ha-card .grid line,
    ha-card .gridline,
    ha-card .recharts-cartesian-grid line {
      stroke: #404860 !important;
    }
    ha-card .forecast,
    ha-card .hourly,
    ha-card .daily,
    ha-card .weather,
    ha-card .temp,
    ha-card .templow,
    ha-card .temperature {
      color: #e4dfc1;
    }
    ha-card .media-info,
    ha-card .entity__info,
    ha-card .metadata,
    ha-card .title,
    ha-card .artist {
      color: #e4dfc1;
    }
    ha-card .media-player,
    ha-card .player,
    ha-card .controls,
    ha-card .progress {
      background: linear-gradient(180deg, #141927 0%, #0b0f17 30%, #05070c 100%);
      box-shadow: inset 1px 1px 0 #757f9c, inset -1px -1px 0 #020305, 0 0 0 1px #121622;
    }
    ha-card table,
    ha-card .table,
    ha-card .mdc-data-table,
    ha-card .mdc-data-table__table-container,
    ha-card .mdc-data-table__content,
    ha-card .table-container,
    ha-card .sources,
    ha-card .entries,
    ha-card .details,
    ha-card .logbook,
    ha-card .history {
      background: linear-gradient(180deg, #141927 0%, #0b0f17 30%, #05070c 100%) !important;
      box-shadow: inset 1px 1px 0 #757f9c, inset -1px -1px 0 #020305, 0 0 0 1px #121622 !important;
      color: #d8d2ae !important;
    }
    ha-card thead,
    ha-card th,
    ha-card .mdc-data-table__header-cell {
      color: var(--winamp-gold-bright) !important;
      background: transparent !important;
    }
    ha-card td,
    ha-card .mdc-data-table__cell {
      color: #d8d2ae !important;
      border-color: #24293b !important;
    }
    ha-card .forecast,
    ha-card .hourly,
    ha-card .daily {
      padding: 6px 8px;
      background: linear-gradient(180deg, #141927 0%, #0b0f17 30%, #05070c 100%) !important;
      box-shadow: inset 1px 1px 0 #757f9c, inset -1px -1px 0 #020305, 0 0 0 1px #121622 !important;
    }
    ha-card mwc-button,
    ha-card button,
    ha-card .button {
      --mdc-theme-primary: #293049;
      --mdc-theme-on-primary: var(--winamp-gold-bright);
    }
    ha-card ha-slider,
    ha-card ha-control-slider {
      --slider-color: var(--winamp-gold);
      --slider-secondary-color: #4c5670;
    }

  card-mod-glance: |
    :host {
      background: linear-gradient(180deg, #121623 0%, #090c14 32%, #05070c 100%);
      box-shadow: inset 1px 1px 0 #6d7693, inset -1px -1px 0 #020305, 0 0 0 1px #121622;
      color: var(--winamp-lcd-green);
      padding: 6px 4px;
    }

  card-mod-badge: |
    :host {
      background: linear-gradient(180deg, #181d2b 0%, #0d1018 26%, #05070c 100%);
      color: #d6d2b8 !important;
      border: 1px solid #23293c;
      border-radius: 4px;
      box-shadow: inset 1px 1px 0 #8088a3, inset -1px -1px 0 #020305, 0 1px 0 #0c0f18;
      padding: 0 5px;
    }

  card-mod-heading-badge: |
    :host {
      background: linear-gradient(180deg, #181d2b 0%, #0d1018 26%, #05070c 100%);
      color: #d6d2b8 !important;
      border: 1px solid #23293c;
      border-radius: 4px;
      box-shadow: inset 1px 1px 0 #8088a3, inset -1px -1px 0 #020305, 0 1px 0 #0c0f18;
    }

  card-mod-assist-chip: |
    :host {
      background: linear-gradient(180deg, #181d2b 0%, #0d1018 26%, #05070c 100%);
      color: #d6d2b8 !important;
      border: 1px solid #23293c;
      border-radius: 4px;
      box-shadow: inset 1px 1px 0 #8088a3, inset -1px -1px 0 #020305, 0 1px 0 #0c0f18;
    }

  card-mod-row-yaml: |
    .: |
      :host {
        display: block;
        margin: 2px 0;
        padding: 1px 5px;
        background: linear-gradient(180deg, #141927 0%, #0b0f17 32%, #05070c 100%);
        box-shadow: inset 1px 1px 0 #757f9c, inset -1px -1px 0 #020305, 0 0 0 1px #121622;
      }
    hui-generic-entity-row$: |
      state-badge {
        color: var(--winamp-gold) !important;
      }
      .info,
      .text-content,
      .secondary,
      .secondary span {
        color: var(--winamp-lcd-green) !important;
      }
      .name {
        color: #d8d2ae !important;
      }
    hui-toggle-entity-row$: |
      state-badge {
        color: var(--winamp-gold) !important;
      }
      .info,
      .text-content,
      .secondary,
      .secondary span {
        color: var(--winamp-lcd-green) !important;
      }
      .name {
        color: #d8d2ae !important;
      }

  card-mod-element: |
    button,
    mwc-button,
    ha-icon-button,
    ha-control-button {
      border-radius: 0 !important;
      background: linear-gradient(180deg, #eff2f7 0%, #d6dae5 18%, #b7bfd2 52%, #9ea7bf 100%) !important;
      color: #283048 !important;
      box-shadow: inset 1px 1px 0 #f8fafd, inset -1px -1px 0 #6f7892, 0 0 0 1px #3a425d !important;
      text-shadow: 0 1px 0 rgba(255,255,255,0.32);
    }
    button:active,
    mwc-button:active,
    ha-icon-button:active,
    ha-control-button:active,
    .selected,
    [aria-pressed="true"] {
      background: linear-gradient(180deg, #9ea7bf 0%, #b7bfd2 26%, #d6dae5 100%) !important;
      box-shadow: inset -1px -1px 0 #f8fafd, inset 1px 1px 0 #6f7892, 0 0 0 1px #2e354c !important;
      transform: translateY(1px);
    }
    ha-slider,
    ha-control-slider {
      --slider-color: var(--winamp-gold) !important;
      --slider-secondary-color: #4c5670 !important;
      --mdc-slider-handle-color: #d7dce6 !important;
      --mdc-slider-focus-handle-color: #d7dce6 !important;
      --mdc-slider-hover-handle-color: #d7dce6 !important;
      --mdc-slider-inactive-track-color: #3e465d !important;
      --mdc-slider-active-track-color: #bca742 !important;
    }
    ha-control-button-group {
      border-radius: 0 !important;
    }
    ha-switch {
      --switch-checked-button-color: #d9dde5;
      --switch-checked-track-color: #8e8540;
      --switch-unchecked-button-color: #d9dde5;
      --switch-unchecked-track-color: #495069;
      border-radius: 3px;
      box-shadow: inset 1px 1px 0 #8088a3, inset -1px -1px 0 #1b2237;
    }

  card-mod-more-info: |
    .container,
    .content,
    ha-dialog,
    .mdc-dialog__surface {
