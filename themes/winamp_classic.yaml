  card-mod-root-yaml: |
    paper-tabs$: |
      #selectionBar {
        height: 0 !important;
        opacity: 0 !important;
      }
      paper-tab {
        margin: 4px 4px 0 0;
        padding: 0 10px;
        min-width: 44px;
        color: #a29d74 !important;
        font-family: Tahoma, Arial, sans-serif;
        font-size: 11px !important;
        font-weight: 700;
        letter-spacing: 0.01em;
        border-radius: 0 !important;
        background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 28%), linear-gradient(180deg, #212637 0%, #171b29 50%, #121521 100%);
        box-shadow: inset 1px 1px 0 rgba(128,136,163,0.38), inset -1px -1px 0 rgba(11,13,21,0.9), 0 0 0 1px rgba(17,20,32,0.85);
      }
      paper-tab[aria-selected="true"] {
        color: var(--winamp-gold-bright) !important;
        background:
          linear-gradient(90deg, transparent 0 5px, #f1eaac 5px 8px, var(--winamp-gold) 8px 22px, #6a6240 22px 24px, transparent 24px calc(100% - 24px), #6a6240 calc(100% - 24px) calc(100% - 22px), var(--winamp-gold) calc(100% - 22px) calc(100% - 8px), #f1eaac calc(100% - 8px) calc(100% - 5px), transparent calc(100% - 5px)),
          linear-gradient(180deg, #252b3e 0%, #181c2a 45%, #111522 100%) !important;
        box-shadow: inset 1px 1px 0 #868faa, inset -1px -1px 0 #090b12, 0 0 0 1px #111420;
      }
    .: |
      ha-app-layout {
        background: var(--lovelace-background);
        font-family: Arial, Tahoma, Verdana, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      app-header {
        background: linear-gradient(180deg, #202637 0%, #171b29 45%, #0f121d 100%) !important;
        border-bottom: 1px solid #111420;
        box-shadow: inset 0 1px 0 #7d869c, inset 0 2px 0 rgba(255,255,255,0.08), inset 0 -1px 0 #0b0d15;
      }
      app-toolbar {
        min-height: 34px;
        background:
          linear-gradient(90deg, transparent 0 8px, #f4efb4 8px 12px, var(--winamp-gold) 12px 54px, #6a6240 54px 56px, transparent 56px calc(100% - 74px), #6a6240 calc(100% - 74px) calc(100% - 72px), var(--winamp-gold) calc(100% - 72px) calc(100% - 14px), #f4efb4 calc(100% - 14px) calc(100% - 10px), transparent calc(100% - 10px)),
          repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, rgba(0,0,0,0.02) 1px, rgba(0,0,0,0.02) 2px),
          linear-gradient(180deg, #23283b 0%, #181c2a 42%, #121624 100%) !important;
        box-shadow: inset 0 1px 0 #7b849b, inset 0 2px 0 rgba(255,255,255,0.08), inset 0 -1px 0 #0b0d15;
      }
      [main-title] {
        color: var(--winamp-gold-bright) !important;
        font-family: Tahoma, Arial, sans-serif;
        font-size: 11px !important;
        font-weight: 700;
        letter-spacing: 0.01em;
        text-transform: none;
        text-shadow: 0 1px 0 #090b12;
      }
      ha-menu-button,
      ha-button-menu,
      ha-assist-chip-icon {
        color: var(--winamp-gold) !important;
      }
      ha-tabs {
        --paper-tabs-selection-bar-color: var(--winamp-gold) !important;
        --mdc-tab-height: 32px;
      }
      hui-view-badges,
      .badges,
      .heading-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin: 8px auto 10px;
        padding: 4px 8px;
        width: fit-content;
        max-width: calc(100% - 24px);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.016) 0%, rgba(255,255,255,0) 18%),
          linear-gradient(180deg, #202536 0%, #181c2a 54%, #111420 100%);
        box-shadow: inset 1px 1px 0 rgba(124,132,156,0.32), inset -1px -1px 0 #090b12, 0 0 0 1px #111420;
      }
      hui-energy-period-selector,
      hui-energy-date-selection,
      ha-date-range-picker,
      ha-selector,
      .range-selection,
      .period-selector {
        --mdc-filled-button-container-color: #d7dce6;
        --mdc-filled-button-label-text-color: #283048;
      }
      hui-energy-period-selector,
      hui-energy-date-selection,
      ha-date-range-picker {
        background:
          linear-gradient(180deg, rgba(188, 194, 212, 0.16) 0%, rgba(142, 149, 173, 0.1) 10%, rgba(71, 77, 97, 0.05) 52%, rgba(9, 11, 18, 0.16) 100%),
          linear-gradient(180deg, #535b72 0%, #42495d 18%, #343b4d 100%) !important;
        box-shadow: inset 1px 1px 0 #8d95ad, inset -1px -1px 0 #20263a, 0 0 0 1px #0b0d15 !important;
        border-radius: 0 !important;
      }
      h1,
      h2,
      .title,
      .header {
        font-family: Arial, Tahoma, Verdana, sans-serif;
        letter-spacing: 0.005em;
      }

  card-mod-sidebar: |
    :host {
      background:
        linear-gradient(180deg, rgba(180,186,206,0.07) 0%, rgba(0,0,0,0) 12%),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, rgba(0,0,0,0.02) 1px, rgba(0,0,0,0.02) 2px),
        linear-gradient(180deg, #51596f 0%, #434a5e 18%, #394054 58%, #31384a 100%) !important;
      border-right: 1px solid #131722;
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.05), inset -1px 0 0 #69718d;
    }
    ha-md-list-item,
    .iron-selected,
    .menu-link {
      border-radius: 0 !important;
      margin: 1px 6px !important;
      min-height: 36px !important;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0) 20%),
        linear-gradient(180deg, #4a5268 0%, #40485b 20%, #3b4255 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -1px 0 rgba(17,20,32,0.65), 0 0 0 1px rgba(20,23,36,0.28);
    }
    .iron-selected,
    ha-md-list-item[selected] {
      background:
        linear-gradient(180deg, rgba(172,196,188,0.15) 0%, rgba(0,0,0,0) 26%),
        linear-gradient(180deg, #586a6c 0%, #4b5d5f 18%, #3d4d50 100%) !important;
      color: var(--winamp-lcd-green) !important;
      box-shadow: inset 1px 1px 0 #8c98a8, inset -1px -1px 0 #213336, 0 0 0 1px #141724;
    }
    ha-md-list-item:not([selected]):not(.iron-selected),
    .menu-link:not(.iron-selected) {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 -1px 0 rgba(18,21,34,0.6), 0 0 0 1px rgba(20,23,36,0.18);
    }
    .primary,
    .mdc-list-item__primary-text {
      font-family: Tahoma, Arial, sans-serif;
      font-size: 12px !important;
      font-weight: 700;
      letter-spacing: 0.005em;
      text-shadow: 0 1px 0 rgba(11,13,21,0.75);
    }
    ha-icon,
    ha-svg-icon {
      color: var(--winamp-gold) !important;
    }

  card-mod-view: |
    :host {
      padding: 6px 8px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.008) 0%, rgba(255,255,255,0) 14%), linear-gradient(180deg, #1d2130 0%, #161924 100%);
    }
    #columns {
      gap: 8px !important;
    }

  card-mod-card: |
    ha-card {
      position: relative;
      overflow: hidden;
      padding-top: 14px;
      background:
        linear-gradient(180deg, rgba(188, 194, 212, 0.18) 0%, rgba(142, 149, 173, 0.12) 8%, rgba(103, 110, 134, 0.06) 18%, rgba(71, 77, 97, 0.05) 52%, rgba(9, 11, 18, 0.22) 100%),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, rgba(0,0,0,0.02) 1px, rgba(0,0,0,0.02) 2px),
        linear-gradient(180deg, #50586d 0%, #434a5e 14%, #3b4255 54%, #343b4e 100%) !important;
      border: 1px solid #141724 !important;
      border-radius: 0 !important;
      box-shadow: inset 1px 1px 0 #9097af, inset 2px 2px 0 rgba(255,255,255,0.07), inset -1px -1px 0 var(--winamp-bevel-dark), 0 0 0 1px #0b0d15 !important;
    }
    ha-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 9px;
      background:
        linear-gradient(
          90deg,
          transparent 0 6px,
          #f4efb4 6px 10px,
          var(--winamp-gold) 10px 36px,
          #6a6240 36px 38px,
          transparent 38px calc(100% - 58px),
          #6a6240 calc(100% - 58px) calc(100% - 56px),
          var(--winamp-gold) calc(100% - 56px) calc(100% - 12px),
          #f4efb4 calc(100% - 12px) calc(100% - 8px),
          transparent calc(100% - 8px)
        ),
        linear-gradient(180deg, #262c3f 0%, #181c2a 48%, #0f121d 100%);
      border-bottom: 1px solid #434962;
      box-shadow: inset 0 1px 0 #7f88a0, inset 0 -1px 0 #0a0d14;
      pointer-events: none;
      z-index: 0;
    }
    ha-card > .card-header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      min-height: 16px;
      margin: -1px 7px 6px;
      padding: 1px 7px 2px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 18%),
        linear-gradient(180deg, #5b637a 0%, #4d5568 32%, #454c60 100%);
      border-top: 1px solid rgba(143,151,175,0.46);
      border-bottom: 1px solid #23283a;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), inset 0 -1px 0 rgba(11,13,21,0.82);
      color: var(--winamp-gold-bright);
      font-family: Tahoma, Arial, sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      text-transform: uppercase;
      text-shadow: 0 1px 0 #090b12;
    }
    ha-card > .card-content,
    ha-card > #states,
    ha-card > .content {
      margin: 0 7px 7px;
      padding: 8px;
      font-size: 13px;
      background: linear-gradient(180deg, #161a27 0%, #0b0f17 32%, #05070c 100%);
      box-shadow: inset 1px 1px 0 #717a95, inset -1px -1px 0 #020305, 0 0 0 1px #121622;
      color: var(--primary-text-color);
    }
    ha-card h1,
    ha-card h2,
    ha-card h3,
    ha-card .name,
    ha-card .header {
      color: var(--winamp-gold-bright);
      font-family: Arial, Tahoma, Verdana, sans-serif;
    }
    ha-card .header {
      font-family: Tahoma, Arial, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      text-shadow: 0 1px 0 #090b12;
    }
    ha-card .secondary,
    ha-card .state__uom,
    ha-card .state,
    ha-card .value {
      color: var(--primary-text-color);
      font-family: Arial, Tahoma, Verdana, sans-serif;
    }
    ha-card ha-chart-base,
    ha-card state-history-charts,
    ha-card .chart-container,
    ha-card .graph,
    ha-card .apexcharts-canvas,
    ha-card .recharts-wrapper {
      display: block;
      margin-top: 4px;
      padding: 8px;
      background: linear-gradient(180deg, #141927 0%, #0b0f17 30%, #05070c 100%) !important;
      box-shadow: inset 1px 1px 0 #757f9c, inset -1px -1px 0 #020305, 0 0 0 1px #121622 !important;
      color: var(--winamp-lcd-green);
    }
    ha-card svg text,
    ha-card .legend,
    ha-card .legend__item,
    ha-card .axis,
    ha-card .xAxis,
    ha-card .yAxis {
      fill: #bcb7a2 !important;
      color: #bcb7a2 !important;
    }
    ha-card .grid line,
    ha-card .gridline,
    ha-card .recharts-cartesian-grid line {
      stroke: #404860 !important;
    }
    ha-card .forecast,
    ha-card .hourly,
    ha-card .daily,
    ha-card .weather,
    ha-card .temp,
    ha-card .templow,
    ha-card .temperature {
      color: #e4dfc1;
    }
    ha-card .media-info,
    ha-card .entity__info,
    ha-card .metadata,
    ha-card .title,
    ha-card .artist {
      color: #e4dfc1;
    }
    ha-card .media-player,
    ha-card .player,
    ha-card .controls,
    ha-card .progress {
      background: linear-gradient(180deg, #141927 0%, #0b0f17 30%, #05070c 100%);
      box-shadow: inset 1px 1px 0 #757f9c, inset -1px -1px 0 #020305, 0 0 0 1px #121622;
    }
    ha-card .media-player {
      padding: 8px 10px;
      border-top: 1px solid rgba(118,126,151,0.3);
