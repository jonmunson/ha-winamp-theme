"Winamp Classic":
  # ── Winamp 5.9.2 palette ──────────────────────────────
  # Chassis / frame
  winamp-chassis: "#353b4e"
  winamp-chassis-dark: "#1e2230"
  winamp-chassis-light: "#4a5068"
  # Display surfaces
  winamp-display: "#080a12"
  winamp-display-mid: "#121620"
  # Silver chrome
  winamp-chrome: "#a0a8bc"
  winamp-chrome-bright: "#cdd3e0"
  winamp-chrome-dim: "#6a7288"
  # LCD green — the hero color
  winamp-lcd-green: "#00ff62"
  winamp-lcd-green-dim: "#0db34f"
  # Bevels
  winamp-bevel-light: "#5a6278"
  winamp-bevel-dark: "#12151f"
  # Reusable composite patterns (referenced via var() in card-mod CSS)
  winamp-pane-bg: "linear-gradient(180deg, #121620 0%, #0a0d15 30%, #060810 100%)"
  winamp-pane-shadow: "inset 1px 1px 0 #12151f, inset -1px -1px 0 #4a5068"
  winamp-titlebar-bg: "linear-gradient(180deg, #282e3c 0%, #1e2230 100%)"
  winamp-btn-bg: "linear-gradient(180deg, #c8cdd8 0%, #b0b8c8 20%, #949cb2 55%, #8088a0 100%)"
  winamp-btn-shadow: "inset 1px 1px 0 #dce0e8, inset -1px -1px 0 #5a6278, 0 0 0 1px #1e2230"

  # ── Core HA variables ──────────────────────────────────
  primary-color: "#00ff62"
  accent-color: "#00ff62"
  rgb-primary-color: "0, 255, 98"
  rgb-accent-color: "0, 255, 98"
  light-primary-color: "#66ff9a"
  dark-primary-color: "#009938"

  primary-background-color: "#090c14"
  secondary-background-color: "#151a26"
  lovelace-background: "#090c14"
  mdc-theme-background: "#1a1e2d"
  card-background-color: "#353b4e"
  ha-card-background: "#353b4e"
  secondary-card-background-color: "#2a3040"
  mdc-theme-surface: "#353b4e"
  mdc-theme-surface-variant: "#2a3040"
  popup-background-color: "#2e3444"
  card-background-image: "repeating-linear-gradient(180deg, rgba(255,255,255,0.006) 0px, rgba(255,255,255,0.006) 1px, transparent 1px, transparent 2px)"

  primary-text-color: "#c8ceda"
  secondary-text-color: "#8890a4"
  text-primary-color: "#c8ceda"
  disabled-text-color: "#505868"
  text-medium-light-color: "#8890a4"
  text-accent-color: "#00ff62"

  app-header-background-color: "#1a1e2d"
  app-header-text-color: "#cdd3e0"
  app-header-selection-bar-color: "#00ff62"
  paper-tabs-selection-bar-color: "#00ff62"
  paper-tab-ink: "#a0a8bc"
  header-tab-text-color: "#8890a4"
  header-tab-text-color-active: "#cdd3e0"
  header-tab-text-color-inactive: "#5a6278"

  sidebar-background-color: "#353b4e"
  sidebar-text-color: "#a0a8bc"
  sidebar-icon-color: "#8890a4"
  sidebar-selected-background-color: "#080a12"
  sidebar-selected-icon-color: "#00ff62"
  sidebar-selected-text-color: "#00ff62"
  sidebar-border-color: "#12151f"

  divider-color: "#3a4258"
  border-color: "#12151f"
  outline-color: "#5a6278"
  table-row-background-color: "#0a0d15"
  table-row-alternative-background-color: "#101420"
  table-row-hover-background-color: "#151a28"

  paper-item-icon-color: "#8890a4"
  paper-item-icon-active-color: "#00ff62"
  state-icon-color: "#8890a4"
  state-icon-active-color: "#00ff62"
  state-icon-unavailable-color: "#3a4054"
  paper-item-selected_-_background-color: "#080a12"
  paper-item-selected-color: "#00ff62"

  paper-listbox-background-color: "#080a12"
  paper-listbox-color: "#00ff62"
  material-background-color: "#2e3444"
  list-item-background-color: "#080a12"
  table-header-background-color: "#1e2230"
  table-header-color: "#cdd3e0"

  label-badge-background-color: "#080a12"
  label-badge-text-color: "#00ff62"
  label-badge-red: "#ff643f"
  label-badge-blue: "#6e7ca9"
  label-badge-green: "#00ff62"
  label-badge-yellow: "#c8b84c"
  label-badge-grey: "#5a6278"

  paper-card-header-color: "#cdd3e0"
  paper-dialog-background-color: "#2e3444"
  paper-dialog-color: "#c8ceda"
  paper-dialog-button-color: "#a0a8bc"
  paper-font-common-base_-_font-family: "Tahoma, Arial, Verdana, sans-serif"
  paper-font-common-code_-_font-family: "'Lucida Console', 'Courier New', monospace"
  primary-font-family: "Tahoma, Arial, Verdana, sans-serif"
  mcg-title-letter-spacing: "0.015em"
  mcg-title-font-weight: "700"
  mini-media-player-base-color: "#c8ceda"
  mini-media-player-accent-color: "#00ff62"
  mini-media-player-icon-color: "#8890a4"
  mini-media-player-button-color: "rgba(160,168,188,0.18)"
  mini-media-player-overlay-color: "rgba(5,7,12,0.88)"
  mini-media-player-overlay-color-stop: "18%"
  mini-media-player-overlay-base-color: "#c8ceda"
  mini-media-player-overlay-accent-color: "#00ff62"
  mini-media-player-media-cover-info-color: "#c8ceda"
  mini-media-player-background-opacity: "1"
  mini-media-player-artwork-opacity: "0.08"
  mini-media-player-progress-height: "6px"
  mini-media-player-scale: "1"
  mini-media-player-name-font-weight: "700"
  code-editor-background-color: "#080a12"
  markdown-code-background-color: "#080a12"
  markdown-table-row-background-color: "#0a0d15"
  markdown-table-row-alternative-background-color: "#101420"

  mdc-theme-primary: "#00ff62"
  mdc-theme-secondary: "#00ff62"
  mdc-theme-on-primary: "#080a12"
  mdc-theme-on-secondary: "#080a12"
  mdc-ripple-color: "#a0a8bc"
  mdc-filled-button-container-color: "#c8cdd8"
  mdc-filled-button-label-text-color: "#1e2230"
  mdc-outlined-button-outline-color: "#5a6278"
  mdc-outlined-button-label-text-color: "#c8ceda"
  mdc-text-button-label-text-color: "#a0a8bc"
  mdc-checkbox-unchecked-color: "#8890a4"
  mdc-checkbox-disabled-color: "#3a4054"
  mdc-radio-unchecked-color: "#8890a4"
  mdc-radio-disabled-color: "#3a4054"
  mdc-select-fill-color: "rgba(8, 10, 18, 0.94)"
  mdc-select-idle-line-color: "#5a6278"
  mdc-select-hover-line-color: "#00ff62"
  mdc-select-label-ink-color: "#c8ceda"
  mdc-select-dropdown-icon-color: "#8890a4"

  input-fill-color: "rgba(8, 10, 18, 0.94)"
  input-ink-color: "#00ff62"
  input-label-ink-color: "#c8ceda"
  input-idle-line-color: "#5a6278"
  input-dropdown-icon-color: "#8890a4"
  input-outlined-idle-border-color: "#5a6278"
  input-outlined-hover-border-color: "#00ff62"
  input-outlined-disabled-border-color: "#3a4054"
  text-field-border-radius: "0px"
  text-field-fill-color: "rgba(8, 10, 18, 0.94)"

  switch-checked-button-color: "#c8cdd8"
  switch-checked-track-color: "#0db34f"
  switch-unchecked-button-color: "#8890a4"
  switch-unchecked-track-color: "#3a4054"
  paper-toggle-button-checked-button-color: "#c8cdd8"
  paper-toggle-button-checked-bar-color: "#0db34f"
  paper-toggle-button-unchecked-button-color: "#8890a4"
  paper-toggle-button-unchecked-bar-color: "#3a4054"

  paper-slider-knob-color: "#c8cdd8"
  paper-slider-knob-start-color: "#c8cdd8"
  paper-slider-pin-color: "#00ff62"
  paper-slider-active-color: "#00ff62"
  paper-slider-secondary-color: "#3a4054"
  paper-slider-container-color: "#2a3040"
  slider-color: "#00ff62"
  slider-secondary-color: "#3a4054"

  error-color: "#ff6b3d"
  warning-color: "#c8b84c"
  success-color: "#00ff62"
  info-color: "#6e7ca9"
  warning-text-color: "#1e2230"
  success-text-color: "#080a12"
  info-text-color: "#1e2230"

  ha-card-border-radius: "0px"
  ha-card-border-width: "1px"
  ha-card-border-color: "#12151f"
  ha-card-box-shadow: "inset 1px 1px 0 #5a6278, inset -1px -1px 0 #12151f, 0 0 0 1px #0a0d15"
  paper-card-background-color: "#2e3444"
  paper-card-background-image: "none"
  ha-dialog-border-radius: "0px"
  ha-view-sections-column-gap: "8px"
  ha-view-sections-row-gap: "8px"
  masonry-view-card-margin: "4px 4px 8px"

  chip-background-color: "#080a12"
  ha-chip-background-color: "#080a12"
  ha-chip-box-shadow: "inset 1px 1px 0 #12151f, inset -1px -1px 0 #4a5068"
  badge-color: "#00ff62"
  badge-background-color: "#080a12"
  ha-card-header-color: "#cdd3e0"
  ha-card-header-font-size: "10px"
  ha-card-header-font-family: "Tahoma, Arial, sans-serif"

  # ── card-mod: root (toolbar, tabs, top-level) ──────────
  card-mod-root-yaml: |
    paper-tabs$: |
      #selectionBar {
        height: 0 !important;
        opacity: 0 !important;
      }
      paper-tab {
        margin: 4px 3px 0 0;
        padding: 0 10px;
        min-width: 44px;
        color: var(--winamp-chrome-dim) !important;
        font-family: Tahoma, Arial, sans-serif;
        font-size: 11px !important;
        font-weight: 700;
        letter-spacing: 0.01em;
        border-radius: 0 !important;
        background: var(--winamp-titlebar-bg);
        box-shadow: inset 1px 1px 0 rgba(90,98,120,0.4), inset -1px -1px 0 rgba(12,15,21,0.8);
      }
      paper-tab[aria-selected="true"] {
        color: var(--winamp-chrome-bright) !important;
        background: linear-gradient(180deg, #3a4054 0%, #323848 100%) !important;
        box-shadow: inset 1px 1px 0 var(--winamp-bevel-light), inset -1px -1px 0 var(--winamp-bevel-dark);
        border-bottom: 2px solid var(--winamp-lcd-green);
      }
    .: |
      ha-app-layout {
        background: var(--lovelace-background);
        font-family: Tahoma, Arial, Verdana, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      app-header {
        background: linear-gradient(180deg, #232838 0%, #1a1e2d 100%) !important;
        border-bottom: 1px solid var(--winamp-bevel-dark);
        box-shadow: inset 0 1px 0 var(--winamp-bevel-light);
      }
      app-toolbar {
        min-height: 34px;
        background: var(--winamp-titlebar-bg) !important;
        box-shadow: inset 0 1px 0 rgba(90,98,120,0.4), inset 0 -1px 0 var(--winamp-bevel-dark);
      }
      [main-title] {
        color: var(--winamp-chrome-bright) !important;
        font-family: Tahoma, Arial, sans-serif;
        font-size: 11px !important;
        font-weight: 700;
        letter-spacing: 0.01em;
        text-transform: none;
        text-shadow: 0 1px 0 #080a12;
      }
      ha-menu-button,
      ha-button-menu,
      ha-assist-chip-icon {
        color: var(--winamp-chrome) !important;
      }
      ha-tabs {
        --paper-tabs-selection-bar-color: var(--winamp-lcd-green) !important;
        --mdc-tab-height: 32px;
      }
      hui-view-badges,
      .badges,
      .heading-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px auto 10px;
        padding: 0;
        width: fit-content;
        max-width: calc(100% - 24px);
        background: transparent;
        box-shadow: none;
      }
      hui-energy-period-selector,
      hui-energy-date-selection,
      ha-date-range-picker,
      ha-selector,
      .range-selection,
      .period-selector {
        --mdc-filled-button-container-color: #c8cdd8;
        --mdc-filled-button-label-text-color: #1e2230;
      }
      hui-energy-period-selector,
      hui-energy-date-selection,
      ha-date-range-picker {
        background: linear-gradient(180deg, #3e4458 0%, #353b4e 100%) !important;
        box-shadow: inset 1px 1px 0 var(--winamp-bevel-light), inset -1px -1px 0 var(--winamp-bevel-dark) !important;
        border-radius: 0 !important;
      }
      h1, h2, .title, .header {
        font-family: Tahoma, Arial, Verdana, sans-serif;
        letter-spacing: 0.005em;
      }

  # ── card-mod: sidebar ──────────────────────────────────
  card-mod-sidebar: |
    :host {
      background: linear-gradient(180deg, #3a4054 0%, #323848 50%, #2a3040 100%) !important;
      border-right: 1px solid var(--winamp-bevel-dark);
      box-shadow: inset 1px 0 0 var(--winamp-bevel-light);
    }
    ha-md-list-item,
    .iron-selected,
    .menu-link {
      border-radius: 0 !important;
      margin: 1px 6px !important;
      min-height: 34px !important;
      background: transparent;
      box-shadow: none;
    }
    .iron-selected,
    ha-md-list-item[selected] {
      background: var(--winamp-display) !important;
      color: var(--winamp-lcd-green) !important;
      box-shadow: var(--winamp-pane-shadow) !important;
    }
    ha-md-list-item:not([selected]):not(.iron-selected):hover,
    .menu-link:not(.iron-selected):hover {
      background: rgba(8,10,18,0.3) !important;
    }
    .primary,
    .mdc-list-item__primary-text {
      font-family: Tahoma, Arial, sans-serif;
      font-size: 12px !important;
      font-weight: 700;
      letter-spacing: 0.005em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.5);
    }
    ha-icon,
    ha-svg-icon {
      color: var(--winamp-chrome-dim) !important;
    }
    .iron-selected ha-icon,
    .iron-selected ha-svg-icon,
    ha-md-list-item[selected] ha-icon,
    ha-md-list-item[selected] ha-svg-icon {
      color: var(--winamp-lcd-green) !important;
    }

  # ── card-mod: view ─────────────────────────────────────
  card-mod-view: |
    :host {
      padding: 6px 8px 12px;
      background: #090c14;
    }
    #columns {
      gap: 8px !important;
    }

  # ── card-mod: card shell ───────────────────────────────
  card-mod-card: |
    ha-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #3e4458 0%, #353b4e 50%, #2e3444 100%) !important;
      border: 1px solid var(--winamp-bevel-dark) !important;
      border-radius: 0 !important;
      box-shadow: inset 1px 1px 0 var(--winamp-bevel-light), inset -1px -1px 0 var(--winamp-bevel-dark), 0 0 0 1px #0a0d15 !important;
    }
    ha-card > .card-header {
      display: flex !important;
      align-items: center !important;
      min-height: 18px !important;
      margin: 0 !important;
      padding: 3px 8px !important;
      background: var(--winamp-titlebar-bg) !important;
      border-bottom: 1px solid rgba(90,98,120,0.3) !important;
      box-shadow: inset 0 1px 0 rgba(90,98,120,0.3), inset 0 -1px 0 var(--winamp-bevel-dark) !important;
      color: var(--winamp-chrome-bright) !important;
      font-family: Tahoma, Arial, sans-serif !important;
      font-size: 10px !important;
      font-weight: 700 !important;
      letter-spacing: 0.02em !important;
      line-height: 1.2 !important;
      text-transform: uppercase !important;
      text-shadow: 0 1px 0 #080a12 !important;
    }
    ha-card > .card-content,
    ha-card > #states,
    ha-card > .content {
      margin: 4px 6px 6px;
      padding: 8px;
      font-size: 13px;
      background: var(--winamp-pane-bg);
      box-shadow: var(--winamp-pane-shadow);
      color: var(--winamp-lcd-green);
    }
    ha-card .header {
      font-family: Tahoma, Arial, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      text-shadow: 0 1px 0 #080a12;
      color: var(--winamp-chrome-bright);
    }
    ha-card > .card-content > h1:first-child,
    ha-card > .card-content > h2:first-child,
    ha-card > .card-content > h3:first-child,
    ha-card > #states > h1:first-child,
    ha-card > #states > h2:first-child,
    ha-card > #states > h3:first-child,
    ha-card > .content > h1:first-child,
    ha-card > .content > h2:first-child,
    ha-card > .content > h3:first-child {
      display: block;
      margin: -8px -8px 8px;
      padding: 3px 8px 4px;
      background: var(--winamp-titlebar-bg);
      border-bottom: 1px solid rgba(90,98,120,0.3);
      box-shadow: inset 0 1px 0 rgba(90,98,120,0.3), inset 0 -1px 0 var(--winamp-bevel-dark);
      color: var(--winamp-chrome-bright) !important;
      font-family: Tahoma, Arial, sans-serif !important;
      font-size: 9px !important;
      font-weight: 700 !important;
      letter-spacing: 0.02em !important;
      line-height: 1.2;
      text-transform: uppercase;
      text-shadow: 0 1px 0 #080a12;
    }
    ha-card .secondary,
    ha-card .state__uom,
    ha-card .state,
    ha-card .value {
      color: var(--winamp-lcd-green);
      font-family: Tahoma, Arial, Verdana, sans-serif;
    }
    ha-card ha-chart-base,
    ha-card state-history-charts,
    ha-card .chart-container,
    ha-card .graph {
      display: block;
      margin-top: 4px;
      padding: 8px;
      background: var(--winamp-pane-bg) !important;
      box-shadow: var(--winamp-pane-shadow) !important;
      color: var(--winamp-lcd-green);
    }
    ha-card svg text,
    ha-card .legend,
    ha-card .legend__item,
    ha-card .axis,
    ha-card .xAxis,
    ha-card .yAxis {
      fill: var(--winamp-chrome-dim) !important;
      color: var(--winamp-chrome-dim) !important;
    }
    ha-card .grid line,
    ha-card .gridline {
      stroke: #2a3248 !important;
    }
    ha-card .forecast,
    ha-card .hourly,
    ha-card .daily,
    ha-card .weather,
    ha-card .temp,
    ha-card .templow,
    ha-card .temperature {
      color: var(--winamp-chrome-bright);
    }
    ha-card .media-info,
    ha-card .entity__info,
    ha-card .metadata {
      color: var(--winamp-lcd-green);
    }
    hui-media-control-card {
      --primary-color: var(--winamp-display) !important;
      --text-primary-color: var(--winamp-chrome-bright) !important;
      --mdc-theme-primary: var(--winamp-lcd-green) !important;
      --mdc-linear-progress-buffer-color: #2a3040 !important;
    }
    ha-card table,
    ha-card .table,
    ha-card .mdc-data-table,
    ha-card .mdc-data-table__table-container,
    ha-card .mdc-data-table__content,
    ha-card .table-container,
    ha-card .entries,
    ha-card .logbook,
    ha-card .history {
      background: var(--winamp-pane-bg) !important;
      box-shadow: var(--winamp-pane-shadow) !important;
      color: var(--winamp-lcd-green) !important;
    }
    ha-card hui-energy-distribution-card,
    ha-card hui-energy-usage-graph-card,
    ha-card hui-energy-solar-graph-card,
    ha-card hui-energy-devices-graph-card,
    ha-card hui-energy-sources-table,
    ha-card hui-energy-carbon-consumed-gas-graph-card,
    ha-card hui-energy-carbon-value-card {
      display: block;
      background: var(--winamp-pane-bg) !important;
      box-shadow: var(--winamp-pane-shadow) !important;
    }
    ha-card thead,
    ha-card th,
    ha-card .mdc-data-table__header-cell {
      color: var(--winamp-chrome-bright) !important;
      background: transparent !important;
    }
    ha-card td,
    ha-card .mdc-data-table__cell {
      color: var(--winamp-lcd-green) !important;
      border-color: #1a1e2d !important;
      font-size: 13px;
    }
    ha-card .forecast,
    ha-card .hourly,
    ha-card .daily {
      padding: 6px 8px;
      background: var(--winamp-pane-bg) !important;
      box-shadow: var(--winamp-pane-shadow) !important;
    }
    ha-card mwc-button,
    ha-card button,
    ha-card .button {
      --mdc-theme-primary: #1e2230;
      --mdc-theme-on-primary: var(--winamp-chrome-bright);
    }
    ha-card ha-slider,
    ha-card ha-control-slider {
      --slider-color: var(--winamp-lcd-green);
      --slider-secondary-color: #3a4054;
    }

  # ── card-mod: card-yaml (shadow DOM targets) ───────────
  card-mod-card-yaml: |
    .: |
      :host {
        --primary-color: var(--winamp-display) !important;
        --text-primary-color: var(--winamp-chrome-bright) !important;
        --mdc-theme-primary: var(--winamp-lcd-green) !important;
        --mdc-linear-progress-buffer-color: #2a3040 !important;
      }
      .background,
      .color-block,
      .color-gradient,
      .image,
      .no-img {
        background: var(--winamp-pane-bg) !important;
        background-color: var(--winamp-display) !important;
      }
      .background {
        opacity: 1 !important;
        filter: none !important;
      }
      .color-gradient { opacity: 0.06 !important; }
      .image { opacity: 0.1 !important; }
      .no-img {
        width: 32% !important;
        opacity: 0.16 !important;
        background-image: none !important;
        background-color: var(--winamp-display-mid) !important;
      }
      .player {
        margin: 6px !important;
        padding: 8px !important;
        height: calc(100% - 12px);
        box-sizing: border-box !important;
        background: var(--winamp-pane-bg) !important;
        box-shadow: var(--winamp-pane-shadow) !important;
      }
      .top-info {
        align-items: center;
        margin: -8px -8px 8px !important;
        padding: 3px 8px !important;
        background: var(--winamp-titlebar-bg) !important;
        border-bottom: 1px solid rgba(90,98,120,0.3);
        box-shadow: inset 0 1px 0 rgba(90,98,120,0.3), inset 0 -1px 0 var(--winamp-bevel-dark);
      }
